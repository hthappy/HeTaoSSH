name: Release
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-latest, windows-latest]
    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Prepare Signing Key
        shell: bash
        env:
          KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          if [ -n "$KEY" ]; then
            echo "TAURI_SIGNING_PRIVATE_KEY<<EOF" >> $GITHUB_ENV
            echo "$KEY" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//' >> $GITHUB_ENV
            echo "EOF" >> $GITHUB_ENV
          fi

      - name: Build App
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          args: --verbose
      
      - name: Verify Build Output
        shell: bash
        run: |
          echo "=== Build Output ==="
          echo "Platform: ${{ matrix.platform }}"
          echo "Bundle directory contents:"
          find src-tauri/target/release/bundle -type f \( \
            -name "*.exe" -o \
            -name "*.msi" -o \
            -name "*.dmg" -o \
            -name "*.app" -o \
            -name "*.app.tar.gz" -o \
            -name "*.zip" \
          \) 2>/dev/null | head -30 || echo "No files found"
          
          echo ""
          echo "Checking for latest.json in project root:"
          if [ -f "latest.json" ]; then
            echo "✓ latest.json found in project root"
            cat latest.json
          else
            echo "✗ latest.json not found in project root"
          fi

      - name: Extract Changelog from CHANGELOG.md
        shell: bash
        run: |
          TAG_NAME=${GITHUB_REF#refs/tags/}
          echo "Extracting changelog for $TAG_NAME..."
          
          # Extract content between first "##" and second "##" from CHANGELOG.md
          awk 'NR>1 && /^## / {if (found) exit; found=1; next} found' CHANGELOG.md > release_notes.md
          
          # Verify extraction
          if [ ! -s release_notes.md ]; then
            echo "Warning: No changelog extracted, using default..."
            echo "## Release $TAG_NAME" > release_notes.md
            echo "" >> release_notes.md
            echo "See CHANGELOG.md for details." >> release_notes.md
          fi
          
          echo "=== Extracted Release Notes ==="
          cat release_notes.md
          echo "==============================="

      - name: Add macOS Warning to Release Notes
        if: matrix.platform == 'macos-latest'
        shell: bash
        run: |
          echo "" >> release_notes.md
          echo "---" >> release_notes.md
          echo "## ⚠️ macOS Compatibility Notice / macOS 兼容性提示" >> release_notes.md
          echo "" >> release_notes.md
          echo "> **Note:** This release has not been fully tested on macOS environments." >> release_notes.md
          echo "> **注意:** 此版本尚未在 macOS 环境下进行充分测试，请谨慎使用。" >> release_notes.md

      - name: Create Release and Update Notes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          TAG_NAME=${GITHUB_REF#refs/tags/}
          echo "Processing release for $TAG_NAME..."
          
          # Create release if it doesn't exist, or update it if it does
          gh release create $TAG_NAME \
            --title "HeTaoSSH $TAG_NAME" \
            --notes-file release_notes.md \
            --draft=false \
            --prerelease=false || \
          gh release edit $TAG_NAME --title "HeTaoSSH $TAG_NAME" --notes-file release_notes.md

      - name: Rename macOS Assets (macOS only)
        if: matrix.platform == 'macos-latest'
        run: |
          echo "Renaming .dmg files to include -beta..."
          find src-tauri/target/release/bundle -name "*.dmg" -exec sh -c 'mv "$1" "${1%.dmg}-beta.dmg"' _ {} \;
          
          echo "Patching latest.json to reflect beta filename..."
          if [ -f "latest.json" ]; then
            sed -i '' 's/\.dmg/-beta.dmg/g' latest.json
          fi

      - name: Upload All Assets
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG_NAME=${GITHUB_REF#refs/tags/}
          PLATFORM="${{ matrix.platform }}"
          echo "Uploading assets for $TAG_NAME ($PLATFORM)..."
          
          # Upload ALL bundle files (Windows: exe, msi / macOS: dmg, app.tar.gz)
          find src-tauri/target/release/bundle -type f \( \
            -name "*.exe" -o \
            -name "*.msi" -o \
            -name "*.dmg" -o \
            -name "*.app.tar.gz" -o \
            -name "*.zip" \
          \) -exec gh release upload $TAG_NAME {} --clobber \;
          
          # Upload latest.json from project root (only from Windows build)
          if [ "${{ matrix.platform }}" == "windows-latest" ] && [ -f "latest.json" ]; then
            echo "Uploading latest.json from project root..."
            gh release upload $TAG_NAME latest.json --clobber
          fi
          
          echo ""
          echo "✓ Assets uploaded successfully for $PLATFORM"
