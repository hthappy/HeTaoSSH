name: Release
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-latest, windows-latest] # macos-latest (ARM) - macos-13 (Intel) disabled due to runner error
    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Prepare Signing Key
        shell: bash
        env:
          KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          if [ -n "$KEY" ]; then
            echo "TAURI_SIGNING_PRIVATE_KEY<<EOF" >> $GITHUB_ENV
            echo "$KEY" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//' >> $GITHUB_ENV
            echo "EOF" >> $GITHUB_ENV
          fi

      - name: Build (No Release)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          # No tagName means build only, no auto-upload
          args: --verbose
      
      - name: Verify Build Output
        shell: bash
        run: |
          echo "=== Build Output ==="
          echo "Bundle directory contents:"
          find src-tauri/target/release/bundle -type f -name "*.json" -o -name "*.dmg" -o -name "*.app" 2>/dev/null | head -20 || echo "No files found"
          
          echo ""
          echo "Checking for latest.json:"
          find src-tauri/target/release/bundle -name "latest.json" -type f

      - name: Create Release and Update Notes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          TAG_NAME=${GITHUB_REF#refs/tags/}
          echo "Processing release for $TAG_NAME..."
          
          # Define release notes with macOS warning
          cat > release_notes.md << 'EOF'
          ## ⚠️ macOS Compatibility Notice / macOS 兼容性提示
          
          > **Note:** This release has not been fully tested on macOS environments.
          > **注意:** 此版本尚未在 macOS 环境下进行充分测试，请谨慎使用。
          EOF
          
          # Create release if it doesn't exist, or update it if it does
          # We force the notes to ensure the warning is visible
          gh release create $TAG_NAME --title "$TAG_NAME" -F release_notes.md --draft=false --prerelease=false || \
          gh release edit $TAG_NAME --title "$TAG_NAME" -F release_notes.md

      - name: Rename macOS Assets
        if: matrix.platform == 'macos-latest'
        run: |
          echo "Renaming .dmg files to include -beta..."
          find src-tauri/target/release/bundle -name "*.dmg" -exec sh -c 'mv "$1" "${1%.dmg}-beta.dmg"' _ {} \;
          
          echo "Patching latest.json to reflect beta filename..."
          # macOS sed requires empty string argument for -i
          find src-tauri/target/release/bundle -name "latest.json" -exec sed -i '' 's/\.dmg/-beta.dmg/g' {} \;

      - name: Upload Assets
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG_NAME=${GITHUB_REF#refs/tags/}
          echo "Uploading assets for $TAG_NAME..."
          
          # Upload DMG/App/Zip
          # Using find to locate artifacts in bundle directory
          # Note: .dmg files are now renamed to *-beta.dmg
          find src-tauri/target/release/bundle -type f \( -name "*.dmg" -o -name "*.app.tar.gz" -o -name "*.zip" \) -exec gh release upload $TAG_NAME {} --clobber \;
          
          echo ""
          echo "✓ macOS assets uploaded"
          echo "Note: latest.json for macOS auto-update requires signing key."
          echo "For now, only Windows supports auto-update via NSIS."

  # Note: finalize-release step removed
  # Windows latest.json is uploaded by local release script
  # macOS does not support auto-update (DMG requires manual download)
  # If you need to merge platform-specific latest.json files, re-add this step
