name: Release
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-latest, macos-13] # macos-latest (ARM), macos-13 (Intel)
    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Prepare Signing Key
        shell: bash
        env:
          KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          if [ -n "$KEY" ]; then
            echo "TAURI_SIGNING_PRIVATE_KEY<<EOF" >> $GITHUB_ENV
            echo "$KEY" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//' >> $GITHUB_ENV
            echo "EOF" >> $GITHUB_ENV
          fi

      - name: Build (No Release)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          # No tagName means build only, no auto-upload
          args: --verbose

      - name: Upload Assets
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG_NAME=${GITHUB_REF#refs/tags/}
          echo "Uploading assets for $TAG_NAME..."
          
          # Upload DMG/App/Zip/Sig
          # Using find to locate artifacts in bundle directory
          find src-tauri/target/release/bundle -type f \( -name "*.dmg" -o -name "*.app.tar.gz" -o -name "*.zip" -o -name "*.sig" \) -exec gh release upload $TAG_NAME {} --clobber \;
          
          # Find and upload latest.json as latest-${{ matrix.platform }}.json
          JSON_PATH=$(find src-tauri/target/release/bundle -name "latest.json" -type f | head -n 1)
          if [ -n "$JSON_PATH" ]; then
             echo "Found latest.json at $JSON_PATH"
             cp "$JSON_PATH" "latest-${{ matrix.platform }}.json"
             gh release upload $TAG_NAME "latest-${{ matrix.platform }}.json" --clobber
          else
             echo "Warning: latest.json not found in bundle output"
          fi

  finalize-release:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Download all latest-*.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG_NAME=${GITHUB_REF#refs/tags/}
          echo "Downloading jsons for $TAG_NAME..."
          
          # Download windows latest.json (uploaded by local script) if exists
          # We save it as latest-windows.json to avoid overwriting
          gh release download $TAG_NAME -p "latest.json" -O latest-windows.json || echo "No windows latest.json found"
          
          # Download macOS jsons
          gh release download $TAG_NAME -p "latest-macos-latest.json" || echo "No macos-latest json found"
          gh release download $TAG_NAME -p "latest-macos-13.json" || echo "No macos-13 json found"
          
          ls -l latest*.json
          
      - name: Merge JSONs
        run: |
          # Use our updated script to merge all available jsons
          # Inputs that don't exist will be skipped by the script
          node scripts/merge_latest_json.js latest.json latest-windows.json latest-macos-latest.json latest-macos-13.json
          
      - name: Upload merged latest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG_NAME=${GITHUB_REF#refs/tags/}
          if [ -f "latest.json" ]; then
            echo "Uploading merged latest.json..."
            gh release upload $TAG_NAME latest.json --clobber
          else
            echo "Error: Merged latest.json not generated"
            exit 1
          fi
