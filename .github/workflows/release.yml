name: Release
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  release-macos:
    permissions:
      contents: write
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Prepare Signing Key
        shell: bash
        env:
          KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          if [ -n "$KEY" ]; then
            echo "TAURI_SIGNING_PRIVATE_KEY<<EOF" >> $GITHUB_ENV
            echo "$KEY" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//' >> $GITHUB_ENV
            echo "EOF" >> $GITHUB_ENV
          fi

      - name: Build macOS App
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          args: --verbose
      
      - name: Verify Build Output
        shell: bash
        run: |
          echo "=== macOS Build Output ==="
          echo "Bundle directory contents:"
          find src-tauri/target/release/bundle -type f \( \
            -name "*.dmg" -o \
            -name "*.app" -o \
            -name "*.app.tar.gz" \
          \) 2>/dev/null | head -20 || echo "No files found"

      - name: Rename macOS Assets
        run: |
          echo "Renaming .dmg files to include -beta..."
          find src-tauri/target/release/bundle -name "*.dmg" -exec sh -c 'mv "$1" "${1%.dmg}-beta.dmg"' _ {} \;
          
          echo "Patching latest.json to reflect beta filename..."
          find src-tauri/target/release/bundle -name "latest.json" -exec sed -i '' 's/\.dmg/-beta.dmg/g' {} \;

      - name: Upload macOS Assets
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG_NAME=${GITHUB_REF#refs/tags/}
          echo "Uploading macOS assets for $TAG_NAME..."
          
          # Upload macOS bundles
          find src-tauri/target/release/bundle -type f \( \
            -name "*.dmg" -o \
            -name "*.app.tar.gz" \
          \) -exec gh release upload $TAG_NAME {} --clobber \;
          
          echo ""
          echo "✓ macOS assets uploaded successfully"
